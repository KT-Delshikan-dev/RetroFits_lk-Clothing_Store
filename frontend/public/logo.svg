<!-- SVG Logo for Retrofits LK -->
<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" className="h-12 w-auto">
  <!-- Background -->
  <rect width="200" height="100" fill="#000000"/>
  
  <!-- Shirt Icon -->
  <g transform="translate(100, 30)">
    <!-- Shirt outline -->
    <path d="M -15 -10 L -8 0 L -8 15 L 8 15 L 8 0 L 15 -10 Z" 
          fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Collar -->
    <line x1="-5" y1="-10" x2="5" y2="-10" stroke="white" stroke-width="1.5"/>
    <!-- Sleeves -->
    <line x1="-15" y1="-8" x2="-20" y2="-5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="-8" x2="20" y2="-5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="white" letter-spacing="2">RETROFITS</text>
  <text x="155" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="white">LK</text>
  
  <!-- Subtitle -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="8" fill="white" 
        text-anchor="middle" letter-spacing="1">AUTHENTIC CLOTHING</text>
</svg>
